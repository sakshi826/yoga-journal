name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login bunker.mantracare.com -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          docker build --no-cache --progress=plain -t bunker.mantracare.com/lovable/yoga-journal:1.1 .
          docker push bunker.mantracare.com/lovable/yoga-journal:1.1
